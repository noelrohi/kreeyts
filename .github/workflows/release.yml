name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v1.0.0. Use latest to republish the latest GitHub Release."
        required: false
        default: "latest"
        type: string

jobs:
  create-release:
    name: Prepare GitHub Release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUESTED_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          if [ "$REQUESTED_TAG" = "latest" ] || [ -z "$REQUESTED_TAG" ]; then
            RELEASE_TAG=$(gh release view --json tagName --jq .tagName)
          else
            RELEASE_TAG="$REQUESTED_TAG"
          fi

          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        env:
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          git fetch --tags --force
          git checkout "$RELEASE_TAG"

      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          case "$RELEASE_TAG" in
            v*.*.*) ;;
            *)
              echo "Release tag must look like vX.Y.Z; got $RELEASE_TAG" >&2
              exit 1
              ;;
          esac

          PACKAGE_VERSION=$(node -p "require('./apps/desktop/package.json').version")
          if [ "v$PACKAGE_VERSION" != "$RELEASE_TAG" ]; then
            echo "apps/desktop/package.json version ($PACKAGE_VERSION) does not match $RELEASE_TAG" >&2
            exit 1
          fi

      - name: Extract changelog for release notes
        id: changelog
        env:
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          NOTES=""

          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk -v ver="$VERSION" '
              /^## \[/ {
                if (found) exit
                if (index($0, "["ver"]")) found=1
              }
              found { print }
            ' CHANGELOG.md)
          fi

          if [ -z "$NOTES" ]; then
            NOTES="Release $RELEASE_TAG"
          fi

          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: ${{ steps.changelog.outputs.notes }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "Assetwell $RELEASE_TAG" \
              --notes "$RELEASE_NOTES" \
              --latest
          else
            gh release create "$RELEASE_TAG" \
              --title "Assetwell $RELEASE_TAG" \
              --notes "$RELEASE_NOTES" \
              --latest \
              --verify-tag
          fi

  publish-electron:
    name: Publish ${{ matrix.platform }} Electron app
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-14
            builder_args: --mac dmg zip --arm64
          - platform: windows
            os: windows-latest
            builder_args: --win nsis --x64
          - platform: linux
            os: ubuntu-24.04
            builder_args: --linux AppImage --x64
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ needs.create-release.outputs.release_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-release.outputs.release_tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and publish signed macOS app
        if: matrix.platform == 'macos'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          EP_GH_IGNORE_TIME: true
        run: bun run --cwd apps/desktop dist -- ${{ matrix.builder_args }} --publish always

      - name: Build and publish unsigned Windows/Linux app
        if: matrix.platform != 'macos'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          EP_GH_IGNORE_TIME: true
        run: bun run --cwd apps/desktop dist -- ${{ matrix.builder_args }} --publish always

  verify-release-assets:
    name: Verify latest release assets
    needs:
      - create-release
      - publish-electron
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ needs.create-release.outputs.release_tag }}

    steps:
      - name: Verify latest GitHub Release contains platform installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_TAG=$(gh release view --json tagName --jq .tagName)
          if [ "$LATEST_TAG" != "$RELEASE_TAG" ]; then
            echo "Expected $RELEASE_TAG to be the latest GitHub Release, but latest is $LATEST_TAG." >&2
            exit 1
          fi

          gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name' | tee release-assets.txt

          require_asset() {
            local pattern="$1"
            local label="$2"
            if ! grep -Eiq "$pattern" release-assets.txt; then
              echo "Missing $label asset on GitHub Release $RELEASE_TAG." >&2
              exit 1
            fi
          }

          require_asset '\.dmg$' "macOS DMG"
          require_asset '\.exe$' "Windows installer"
          require_asset '\.AppImage$' "Linux AppImage"
